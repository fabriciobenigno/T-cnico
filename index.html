<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Índice de Cursos - Unicesumar</title>

<style>
/* ===== AJUSTE TÉCNICO PARA SIMETRIA ===== */
*{ box-sizing: border-box; }

body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;

    background: linear-gradient(135deg,#0b2d5c,#0f4aa1);
    font-family: Arial, Helvetica, sans-serif;

    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ===== CONTAINER (MESMO ESTILO, MAIS SIMÉTRICO) ===== */
.container{
    width: min(500px, 100%);
    text-align:center;
    background: rgba(255,255,255,0.08);
    padding:36px 32px;
    border-radius:18px;
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 12px 30px rgba(0,0,0,0.28);

    /* simetria interna */
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 18px;
}

/* Bloco interno para garantir largura igual entre input e resultado */
.bloco{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 14px;
}

/* ===== LOGO ===== */
.logo{
    width:160px;
    height:auto;
    display:block;
    margin:0 auto;
}

/* ===== INPUT (MESMA IDEIA, ALINHAMENTO PERFEITO) ===== */
input{
    width:100%;
    display:block;
    padding:16px 16px;
    font-size:18px;
    border:none;
    border-radius:12px;
    outline:none;
    text-align:center;
    text-transform:uppercase;

    background: rgba(255,255,255,0.92);
    color:#0b2d5c;

    box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    transition: box-shadow .15s ease, transform .15s ease;
}

input::placeholder{
    color: rgba(11,45,92,0.55);
    text-transform:none;
}

input:focus{
    box-shadow: 0 0 0 4px rgba(255,255,255,0.20), 0 10px 22px rgba(0,0,0,0.22);
    transform: translateY(-1px);
}

/* ===== RESULTADO (MESMA LARGURA DO INPUT) ===== */
#resultado{
    width:100%;
    min-height:35px;
    padding: 10px 12px;

    font-size:20px;
    color:#ffffff;
    font-weight:bold;
    line-height:1.25;

    display:flex;
    align-items:center;
    justify-content:center;

    text-shadow: 0 10px 18px rgba(0,0,0,0.25);
}

/* ===== CRÉDITO ===== */
.credito{
    position: fixed;
    bottom: 6px;
    right: 10px;
    font-size: 9px;
    opacity: 0.25;
    color: #ffffff;
    pointer-events: none;
    user-select: none;
}
</style>
</head>

<body>

<div class="container">
    <img src="tata.png" class="logo" alt="Unicesumar">

    <div class="bloco">
        <input type="text" id="busca" placeholder="Digite o código COMPLETO do curso" autocomplete="off">
        <div id="resultado"></div>
    </div>
</div>

<div class="credito">Desenvolvido por Fabricio Benigno</div>

<script>
/* ===================================================
   ===== ÁREA PARA VOCÊ ADICIONAR TODOS OS CURSOS =====

   Sempre seguir este padrão:

   "CODIGO_EXATO":"Nome do Curso",

   ⚠️ Não esquecer vírgula no final
   ⚠️ O último item NÃO pode ter vírgula
=================================================== */

const cursos = {"ETEC_AGRO":"Agronegócios",
    "ETEC_COGRA":"Computação Gráfica",
    "ETEC_CCONT":"Contabilidade",
    "ETEC_COOP":"Cooperativismo",
    "ETEC_IDOSO":"Cuidados de Idosos",
    "ETEC_DESIS":"Desenvolvimento de Sistemas",
    "ETEC_ENFER":"Enfermagem",
    "ETEC_INFO":"Informática para Internet",
    "ETEC_PODOL":"Podologia",
    "ETEC_RADIO":"Radiologia",
    "ETEC_RH":"Recursos Humanos",
    "ETEC_SECES":"Secretaria Escolar",
    "ETEC_SEGUR":"Segurança do Trabalho",
    "ETEC_SEJUR":"Serviços Jurídicos"};

/* ===== BUSCA SOMENTE POR CÓDIGO COMPLETO ===== */
const input = document.getElementById("busca");
const resultado = document.getElementById("resultado");

input.addEventListener("input", function () {
    const valor = this.value.trim().toUpperCase();
    resultado.textContent = "";
    if (valor === "") return;

    // 🔒 Só retorna se o código for exatamente igual
    if (cursos.hasOwnProperty(valor)) {
        resultado.textContent = cursos[valor];
    }
});
</script>

</body>
</html>
